<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f4f4f9;
  }
  .card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    text-align: center;
  }
  input {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
    margin-right: 8px;
    outline: none;
  }
  button {
    padding: 10px 20px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover {
    background-color: #0056b3;
  }
  #result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    color: #333;
  }
</style>
</head>
<body>

<div class="card">
  <h2>Even or Odd Checker</h2>
  <input id="n" type="number" placeholder="Enter number">
  <button onclick="check()">Check</button>
  <p id="result"></p>
</div>

<script>
function check() {
  let n = document.getElementById("n").value;
  
  
  if (n % 2 == 0) {
    document.getElementById("result").innerText = "Even Number";
  } else {
    document.getElementById("result").innerText = "Odd Number";
  }
}
</script>

</body>
</html>
