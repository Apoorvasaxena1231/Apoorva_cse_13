<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- bootstrap v5 link -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>

    <h1><B>BOOTSTRAP:</B></h1>
        <h2><b><i>Alignment of text </i></b></h2>  
     <h2 class="text-center">CENTER</h2>
      <h2 class="text-start">START</h2>
       <h2 class="text-end">END</h2>

          <!-- color -->
      <h2><b>Color of text</b> </h2>  
       <p class="text-primary">APOORVA</p>
       <p class="text-secondary">APOORVA</p>
       <p class="text-success">APOORVA</p>
       <p class="text-success">APOORVA</p>
       <p class="text-danger">APOORVA</p>
       <p class="text-dark">APOORVA</p>
       <p class="text-warning">APOORVA</p>
       <p class="text-info">APOORVA</p>
      
       <!-- display for sizes -->
        <h2><b>Display of sizes of text</b> </h2>  
       <h1 class="display-1">large</h1>
        <h1 class="display-2">medium</h1>
         <h1 class="display-3">small</h1>

         
</body>
</html>
